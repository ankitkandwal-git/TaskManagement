version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=your_mongodb_atlas_uri_here
      - PORT=5000
      - NODE_ENV=production

  frontend:
    build:
      context: ./frontend
      args:
        # The browser uses this URL to reach the backend
        - VITE_API_URL=http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend