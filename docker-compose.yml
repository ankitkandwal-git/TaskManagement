version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: taskmanagement_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: taskdb
    volumes:
      - mongodb_data:/data/db
    networks:
      - taskmanagement_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: taskmanagement_backend
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/taskdb?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_change_in_production}
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskmanagement_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanagement_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - taskmanagement_network
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5001

volumes:
  mongodb_data:
    driver: local

networks:
  taskmanagement_network:
    driver: bridge
